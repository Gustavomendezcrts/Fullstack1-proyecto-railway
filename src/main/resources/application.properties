# ==============================================================================
# CONFIGURACIÓN DE LA APLICACIÓN (Spring Boot)
# ==============================================================================
spring.application.name=recomendacionApp

# ------------------------------------------------------------------------------
# CONEXIÓN A LA BASE DE DATOS (MySQL)
# ------------------------------------------------------------------------------
# Si existe SPRING_DATASOURCE_URL (Railway) la usa; de lo contrario usa DB_URL_DOCKER (Local)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL_DOCKER}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------------------------------------------------
# CONFIGURACIÓN DE HIBERNATE / JPA
# ------------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------------------------
# SEGURIDAD (JWT) - Solución al error del crash
# ------------------------------------------------------------------------------
# Mapea la variable de entorno JWT_SECRET al placeholder que busca tu clase JwtUtil
jwt.secret=${JWT_SECRET}

# ------------------------------------------------------------------------------
# APIS EXTERNAS (TMDB)
# ------------------------------------------------------------------------------
tmdb.base-url=${TMDB_BASE_URL}
tmdb.api-key=${TMDB_API_KEY}

# Evita conflicto conocido entre springdoc y HATEOAS en esta combinacion de versiones
springdoc.enable-hateoas=false
