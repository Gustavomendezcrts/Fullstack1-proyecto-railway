spring.application.name=bibliotecaduoc
server.port=${PORT:8080}

# Conexion a MySQL (valores sensibles por variables de entorno)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# TMDB API (peliculas, sin API key)
tmdb.base-url=${TMDB_BASE_URL}
tmdb.api-key=${TMDB_API_KEY}

# Spring Security - JWT
# IMPORTANTE: cambia este valor en produccion por uno aleatorio largo (min 32 caracteres)
# JwtUtil lee JWT_SECRET directamente desde la variable de entorno

# Evita conflicto conocido entre springdoc y HATEOAS en esta combinacion de versiones
springdoc.enable-hateoas=false